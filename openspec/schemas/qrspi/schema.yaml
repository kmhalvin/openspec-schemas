name: qrspi
version: 1
description: An efficient, unified ACE-FCA QRSPI workflow featuring strict context drops and flat artifact routing

artifacts:
  # ============================================
  # ALIGNMENT PHASE: QUESTION RESEARCH
  # ============================================

  - id: question-research-prep
    generates: ".instructions/question-research.md"
    description: Main agent creates instructions for pre-question codebase mapping
    template: instruction.md
    instruction: |
      ## Main Agent Instructions
      Read the context and original ticket to understand what is being asked.
      If the context is ambiguous, you may first ask the user brief clarifying questions in chat about the broad business goals. If the context is clear enough, skip asking questions.
      
      Once you have sufficient context, write instructions for the subagent to blindly browse the codebase to map relevant files and formulate deep technical questions into `.alignment/question-research.md`.

      CRITICAL: You MUST replace `{ARTIFACT_ID}` and `{CHANGE_NAME}` placeholders with actual string values from your execution context. Since the next subagent starts empty, it absolutely needs full, literal paths to find files without guessing. Do not leave literal `{}` braces behind.
      
      ## REQUIRED: After Generating `.instructions/question-research.md`
      
      CRITICAL: DO NOT use attempt_completion or exit. The workflow is not complete.

      You must immediately spawn a subagent to execute the next artifact. If your agent has a built-in subagent tool (e.g. Task()), use it directly. Otherwise, read your provided project context to find the configured subagent CLI command.
      CRITICAL: Main Agent MUST replace `{CHANGE_NAME}` with the real change name string before executing so the subagent has the correct context!
      Pass the following prompt to the subagent:
      "/opsx-continue.md You are a Subagent working on change: {CHANGE_NAME}\n\nExecute ONLY subagent artifacts. Do NOT execute *-prep artifacts."

      ## REQUIRED: Immediate Continuing
      Once the subagent finishes and `.alignment/question-research.md` is generated, immediately continue natively to the `draft-questions` artifact to prepare Q&A.
    requires: []

  - id: question-research
    generates: ".alignment/question-research.md"
    description: Subagent maps codebase based on initial ticket to assist with targeted questions
    template: question-research.md
    instruction: |
      ## Subagent Instructions

      IMPORTANT: Execute ONLY this artifact. Do not continue to other artifacts.
      After completion, return control to main agent.

      1. Read all completed dependency artifacts for context using the absolute paths provided
      2. Follow the dependency instructions provided in the `.instructions/question-research.md` file and write output to the provided output path
      3. Return control to main agent - DO NOT proceed to next artifact
    requires:
      - question-research-prep

  # ============================================
  # QUESTIONS PHASE
  # ============================================

  - id: draft-questions
    generates: "questions.md"
    description: Main agent asks clarifying questions about the initial task
    template: questions.md
    instruction: |
      ## Main Agent Instructions

      Before writing, read all completed dependency artifacts listed in this artifact's `requires` to gather context.

      Read the context, original ticket, and `.alignment/question-research.md`. The Subagent has formulated detailed, codebase-specific technical questions inside this document.
      DO NOT immediately write `questions.md`. First, present these technical questions to the user in this chat and work back and forth to resolve them.
      
      ONLY ONCE the Subagent's technical questions are answered and resolved, formalize the final summary and objective research directives into `questions.md`.
      
      ## REQUIRED: Context Drop
      After creating `questions.md`, you MUST perform a Context Drop to clear your session memory before research begins.
      - If your configured agent framework supports starting new tasks autonomously (e.g., via a `new_task` tool), use it to start a new task with the context: `/opsx-continue.md`
      - Otherwise, you MUST halt execution (e.g., using `attempt_completion` or explicitly stopping) and instruct the human: "Please start a New Chat / Task, then run `/opsx-continue.md`"
      This provides a fresh context window for continuing to the next artifact.
    requires:
      - question-research

  # ============================================
  # RESEARCH PHASE
  # ============================================

  - id: research-codebase
    generates: "codebase.md"
    description: Main agent deeply explores codebase to map relevant files and patterns
    template: research.md
    instruction: |
      ## Main Agent Instructions

      Before writing, read all completed dependency artifacts listed in this artifact's `requires` to gather context.

      Read the answered Q&A in `questions.md`. Deeply explore the codebase without making architectural assumptions, and output objective facts into `codebase.md`.

      ## REQUIRED: Context Drop
      After creating `codebase.md`, you MUST perform a Context Drop to clear your session memory.
      - If your configured agent framework supports starting new tasks autonomously (e.g., via a `new_task` tool), use it to start a new task with the context: `/opsx-continue.md`
      - Otherwise, you MUST halt execution (e.g., using `attempt_completion` or explicitly stopping) and instruct the human: "Please start a New Chat / Task, then run `/opsx-continue.md`"
      This provides a fresh context window for continuing to the next artifact.
    requires:
      - draft-questions

  # ============================================
  # ALIGNMENT PHASE: DESIGN PROPOSAL
  # ============================================

  - id: design-proposal-prep
    generates: ".instructions/design-proposal.md"
    description: Main agent creates instructions for architecture proposal drafting
    template: instruction.md
    instruction: |
      ## Main Agent Instructions

      Before writing instructions, read all completed dependency artifacts listed in this artifact's `requires` to gather context.

      Read `codebase.md`. Write instructions for the subagent to output `.alignment/design-proposal.md` (the "brain dump" of patterns it intends to mimic).

      CRITICAL: You MUST replace `{ARTIFACT_ID}` and `{CHANGE_NAME}` placeholders with actual string values from your execution context. Since the next subagent starts empty, it absolutely needs full, literal paths to find files without guessing. Do not leave literal `{}` braces behind.
      
      ## REQUIRED: After Generating `.instructions/design-proposal.md`
      
      CRITICAL: DO NOT use attempt_completion or exit. The workflow is not complete.

      You must immediately spawn a subagent to execute the next artifact. If your agent has a built-in subagent tool (e.g. Task()), use it directly. Otherwise, read your provided project context to find the configured subagent CLI command.
      CRITICAL: Main Agent MUST replace `{CHANGE_NAME}` with the real change name string before executing so the subagent has the correct context!
      Pass the following prompt to the subagent:
      "/opsx-continue.md You are a Subagent working on change: {CHANGE_NAME}\n\nExecute ONLY subagent artifacts. Do NOT execute *-prep artifacts."

      ## REQUIRED: Immediate Continuing
      Once the subagent finishes and `.alignment/design-proposal.md` is generated, immediately continue natively to the `draft-design` artifact for discussion.
    requires:
      - research-codebase
      - draft-questions

  - id: design-proposal
    generates: ".alignment/design-proposal.md"
    description: Subagent brain-dumps intentions and architectural patterns
    template: design-proposal.md
    instruction: |
      ## Subagent Instructions

      IMPORTANT: Execute ONLY this artifact. Do not continue to other artifacts.
      After completion, return control to main agent.

      1. Read all completed dependency artifacts for context using the absolute paths provided
      2. Follow the dependency instructions provided in the `.instructions/design-proposal.md` file and write output to the provided output path
      3. Return control to main agent - DO NOT proceed to next artifact
    requires:
      - design-proposal-prep
      - research-codebase
      - draft-questions

  # ============================================
  # DESIGN PHASE
  # ============================================

  - id: draft-design
    generates: "design.md"
    description: Main agent discusses proposed patterns with user for brain surgery alignment and drafts final architectural document
    template: design.md
    instruction: |
      ## Main Agent Instructions

      Before writing, read all completed dependency artifacts listed in this artifact's `requires` to gather context.

      Read the context, original ticket, and `.alignment/design-proposal.md`.
      DO NOT immediately write `design.md`. Present the proposed patterns and decisions to the user and ask for their approval.
      Discuss the design back-and-forth. If the user rejects a pattern, make a note of it.
      Only once the user explicitly approves the final design approach, formalize the outcomes into `design.md`.

      ## REQUIRED: Context Drop
      After creating `design.md`, you MUST perform a Context Drop to clear your session memory.
      - If your configured agent framework supports starting new tasks autonomously (e.g., via a `new_task` tool), use it to start a new task with the context: `/opsx-continue.md`
      - Otherwise, you MUST halt execution (e.g., using `attempt_completion` or explicitly stopping) and instruct the human: "Please start a New Chat / Task, then run `/opsx-continue.md`"
      This provides a fresh context window for continuing to the next artifact.
    requires:
      - design-proposal
      - research-codebase
      - draft-questions

  # ============================================
  # STRUCTURE PHASE
  # ============================================

  - id: draft-structure
    generates: "structure.md"
    description: Main agent writes high-level outline of phase architecture
    template: structure.md
    instruction: |
      ## Main Agent Instructions

      Before writing, read all completed dependency artifacts listed in this artifact's `requires` to gather context.

      Read the original ticket, the research in `codebase.md`, and the approved `design.md`. 
      Output `structure.md` (the "C header" architecture based on the approved design).

      ## REQUIRED: Context Drop
      After creating `structure.md`, you MUST perform a Context Drop to clear your session memory.
      - If your configured agent framework supports starting new tasks autonomously (e.g., via a `new_task` tool), use it to start a new task with the context: `/opsx-continue.md`
      - Otherwise, you MUST halt execution (e.g., using `attempt_completion` or explicitly stopping) and instruct the human: "Please start a New Chat / Task, then run `/opsx-continue.md`"
      This provides a fresh context window for continuing to the next artifact.
    requires:
      - draft-design
      - research-codebase
      - draft-questions

  # ============================================
  # PLAN PHASE
  # ============================================

  - id: draft-plan
    generates: "plan.md"
    description: Main agent writes concrete task checklists grouped by phase
    template: plan.md
    instruction: |
      ## Main Agent Instructions

      Before writing, read all completed dependency artifacts listed in this artifact's `requires` to gather context.

      Read the approved `structure.md`. Generate the detailed task checklists in `plan.md`.

      ## REQUIRED: Context Drop
      After creating `plan.md`, you MUST perform a Context Drop to clear your session memory.
      - If your configured agent framework supports starting new tasks autonomously (e.g., via a `new_task` tool), use it to start a new task with the context: `/opsx-continue.md`
      - Otherwise, you MUST halt execution (e.g., using `attempt_completion` or explicitly stopping) and instruct the human: "Please start a New Chat / Task, then run `/opsx-continue.md`"
      This provides a fresh context window for continuing to the next artifact.
    requires:
      - draft-structure
      - draft-design
      - research-codebase
      - draft-questions

  # ============================================
  # IMPLEMENTATION PHASE
  # ============================================

apply:
  requires: [draft-plan]
  tracks: plan.md
  instruction: |
    You are in the Implement Phase.
    
    ## REQUIRED: Context Alignment
    Before implementing, read `questions.md`, `codebase.md`, `design.md`, `structure.md`, and `plan.md` artifacts to load the absolute truth into your current context.

    Open `plan.md` and execute the plan task by task. Once a task is completed, mark it as `[x]` using the edit tool.
    Verify your work by running the automated Success Criteria tests listed in the file.
    When a Phase requires Manual verification, pause and explicitly ask the user to verify.
